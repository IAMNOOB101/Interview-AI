version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-interviewai}
      POSTGRES_PASSWORD: ${DB_PASS:-interviewai_pass}
      POSTGRES_DB: ${DB_NAME:-interviewai}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-interviewai}"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits: { memory: 1g }

  backend:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.backend
    restart: always
    environment:
      NODE_ENV: production
      PORT: 4000
      DB_NAME: ${DB_NAME:-interviewai}
      DB_USER: ${DB_USER:-interviewai}
      DB_PASS: ${DB_PASS:-interviewai_pass}
      DB_HOST: postgres
      DB_PORT: 5432
      JWT_SECRET: ${JWT_SECRET}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
      CLIENT_URL: ${CLIENT_URL:-http://localhost}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      replicas: 2         # scale horizontally for 10k users
      resources:
        limits: { memory: 512m }
      restart_policy:
        condition: on-failure
        delay: 5s

  frontend:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    deploy:
      resources:
        limits: { memory: 128m }

volumes:
  pgdata:
